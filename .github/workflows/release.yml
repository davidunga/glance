name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: ./build.sh

      - name: Zip app bundle
        run: ditto -c -k --keepParent Glance.app Glance.app.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Glance.app.zip
            install-cli.sh
          generate_release_notes: true
